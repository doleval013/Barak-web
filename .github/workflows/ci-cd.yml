name: Docker Image CI/CD

on:
  push:
    branches:
      - dev
      - staging
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/barak-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Note: We must also push the unique SHA tag for the backend so Kustomize can point to it
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/barak-web-backend:${{ github.sha }},${{ secrets.DOCKERHUB_USERNAME }}/barak-web-backend:latest
          
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: doleval013/Barak-web-infra
          token: ${{ secrets.GH_PAT }}
          path: infra-repo

      - name: Determine Environment and Version
        id: env-details
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            VERSION=${{ github.ref_name }}
            echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "VERSION=dev-${{ github.sha }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/heads/staging ]]; then
            echo "ENV=staging" >> $GITHUB_ENV
            echo "VERSION=staging-${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Update Kubernetes Manifest in Infra Repo
        run: |
          cd infra-repo
          
          # Setup basic git config
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Use Kustomize to update the specific environment overlay
          cd k8s/overlays/$ENV
          
          # Download kustomize (remove existing first)
          rm -f kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          
          # Set the new image tags (using the immutable git SHA)
          ./kustomize edit set image doleval013/barak-web=doleval013/barak-web:${{ github.sha }}
          ./kustomize edit set image doleval013/barak-web-backend=doleval013/barak-web-backend:${{ github.sha }}
          
          # Update the GIT_COMMIT in the environment patch explicitly
          sed -i "s|value: \".*\"$|value: \"${{ github.sha }}\"|g" env-patch.yaml
          
          cd ../../../
          
          # Commit and Push
          git add k8s/overlays/$ENV
          git commit -m "Deploy to $ENV: Update image tags and commit hash to ${{ github.sha }}"
          git push origin main

